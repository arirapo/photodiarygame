<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unknown Faces</title>
  <meta
    name="description"
    content="A digital installation built from ghost image and grid traces."
  />
  <link rel="stylesheet" href="unknownfaces.css" />
</head>
<body>
  <main class="unknownfaces-app">
    <section class="installation-stage" aria-label="Unknown Faces installation">
      <div class="layer layer-background" aria-hidden="true"></div>

      <div class="layer layer-ghost-base" id="ghost-base-layer" aria-hidden="true">
        <img src="assets/IMG_1646.jpeg" alt="" id="ghost-base-image" />
      </div>

      <div class="layer layer-grid-field" id="grid-field" aria-hidden="true"></div>

      <div class="layer layer-veil" aria-hidden="true"></div>
    </section>
  </main>

  <script type="module" src="unknownfaces.js"></script>
</body>
</html>
