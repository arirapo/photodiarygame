<!doctype html>
<html lang="fi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Photodiarygame – Miksang</title>
  <style>
    :root{
      --bg:#f5f1ea;
      --paper:#fbf8f3;
      --ink:#2f2a24;
      --muted:#7a7168;
      --line:rgba(47,42,36,.12);
      --accent:#8b7765;
      --soft:#efe7dc;
      --ok:#49684f;
      --warn:#9a5c3c;
      --radius:22px;
      --shadow:0 14px 40px rgba(45,38,31,.08);
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      padding:0;
      background:linear-gradient(180deg,var(--bg),#efe8de);
      color:var(--ink);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      min-height:100%;
    }

    body{min-height:100vh}
    img{max-width:100%;display:block}
    button,input{font:inherit}
    #app{width:100%}

    .shell{
      width:min(860px,calc(100vw - 28px));
      margin:0 auto;
      padding:22px 0 56px;
    }

    .hero{padding:20px 0 10px}

    .back-link{
      display:inline-block;
      margin-bottom:14px;
      font-size:.9rem;
      color:var(--muted);
      text-decoration:none;
    }

    .back-link:hover{
      text-decoration:underline;
    }

    .eyebrow{
      font-size:.78rem;
      letter-spacing:.14em;
      text-transform:uppercase;
      color:var(--muted);
      margin-bottom:10px;
    }

    h1,h2,h3,p{margin-top:0}

    h1{
      font-size:clamp(2rem,6vw,4rem);
      line-height:.95;
      letter-spacing:-.04em;
      margin-bottom:14px;
    }

    .lead{
      font-size:clamp(1rem,2.2vw,1.1rem);
      line-height:1.65;
      color:var(--muted);
      max-width:62ch;
    }

    .card{
      background:rgba(255,255,255,.56);
      backdrop-filter:blur(10px);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:18px;
    }

    .stack{display:grid;gap:16px}
    .actions{display:flex;gap:12px;flex-wrap:wrap}

    .button{
      appearance:none;
      border:1px solid var(--line);
      border-radius:999px;
      padding:12px 18px;
      min-height:46px;
      cursor:pointer;
      background:rgba(255,255,255,.58);
      color:var(--ink);
      transition:transform .12s ease, background .12s ease, border-color .12s ease;
    }

    .button:hover{
      transform:translateY(-1px);
      background:white;
    }

    .button.primary{
      background:var(--ink);
      color:white;
      border-color:transparent;
    }

    .button.soft{background:var(--soft)}

    .button:disabled{
      opacity:.55;
      cursor:wait;
    }

    .stepper{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:10px;
    }

    .step{
      border:1px solid var(--line);
      border-radius:16px;
      padding:10px 12px;
      background:rgba(255,255,255,.42);
    }

    .step.active{
      background:white;
      border-color:rgba(47,42,36,.24);
    }

    .step .label{
      font-size:.75rem;
      text-transform:uppercase;
      letter-spacing:.12em;
      color:var(--muted);
      margin-bottom:6px;
    }

    .step .title{font-weight:600}

    .phase-title{
      font-size:clamp(1.4rem,3.8vw,2rem);
      margin-bottom:10px;
      letter-spacing:-.03em;
    }

    .phase-points{display:grid;gap:10px}

    .point{
      background:rgba(255,255,255,.54);
      border:1px solid var(--line);
      border-radius:16px;
      padding:12px 14px;
    }

    .point strong{
      display:block;
      margin-bottom:4px;
    }

    .notice{
      font-size:.96rem;
      line-height:1.55;
      color:var(--muted);
    }

    .status{
      font-size:.96rem;
      line-height:1.55;
    }

    .status.ok{color:var(--ok)}
    .status.warn{color:var(--warn)}

    .hidden{display:none!important}

    .capture-wrap{
      border:1px dashed rgba(47,42,36,.2);
      border-radius:20px;
      padding:18px;
      background:rgba(255,255,255,.3);
    }

    .preview,.result-image{
      border-radius:18px;
      overflow:hidden;
      border:1px solid var(--line);
      background:#ddd;
    }

    .preview img{
      width:100%;
      max-height:520px;
      object-fit:cover;
    }

    .result-image img{
      width:100%;
      max-height:640px;
      object-fit:contain;
      background:#eee;
    }

    .aforism{
      font-family:Georgia,"Times New Roman",serif;
      font-size:clamp(1.2rem,2.5vw,1.6rem);
      line-height:1.7;
      white-space:pre-line;
    }

    .meta{
      display:grid;
      gap:8px;
      color:var(--muted);
      font-size:.94rem;
    }

    .tags{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .tag{
      display:inline-flex;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.5);
    }

    .small{
      font-size:.9rem;
      color:var(--muted);
    }

    .footer-note{
      margin-top:28px;
      color:var(--muted);
      font-size:.9rem;
    }

    .thin{font-weight:500}
  </style>
</head>
<body>
<div id="app"></div>

<script type="module">
import * as exifr from "https://cdn.jsdelivr.net/npm/exifr/dist/lite.esm.js";
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";
import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyD-FTHW5Mg8o7_JNXNalKIw_sdxtC-A-G0",
  authDomain: "photodiarygame.firebaseapp.com",
  projectId: "photodiarygame",
  storageBucket: "photodiarygame.firebasestorage.app",
  messagingSenderId: "745003978989",
  appId: "1:745003978989:web:727489ba72b34d77af3ce4",
  measurementId: "G-1T7CBFRP55"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

const state = {
  step: 0,
  selectedFile: null,
  previewUrl: null,
  exif: null,
  color: null,
  aforism: "",
  savedDocId: null
};

const steps = [
  {
    key: "pause",
    label: "A",
    title: "Pause",
    subtitle: "Open before looking.",
    points: [
      ["Open up", "Let the scene arrive before you try to understand it."],
      ["Be humble", "Do not demand a special moment. Receive what is already here."],
      ["Accept what is", "Nothing needs to improve before you begin."]
    ]
  },
  {
    key: "notice",
    label: "B",
    title: "Notice",
    subtitle: "Attend before capturing.",
    points: [
      ["Pay attention", "Let attention settle on color, light, space, edge, rhythm."],
      ["Get curious", "Stay with what catches you, even if it seems small."],
      ["Experience wonder", "Allow the ordinary to appear as if for the first time."]
    ]
  },
  {
    key: "capture",
    label: "C",
    title: "Capture",
    subtitle: "Take one simple photograph.",
    points: [
      ["See possibilities", "Notice the frame that is already forming."],
      ["Keep it simple", "One photograph is enough."],
      ["Establish the relationship", "Let the image record the meeting between you and what appeared."]
    ]
  }
];

function uid() {
  return crypto.randomUUID ? crypto.randomUUID() : String(Date.now()) + Math.random().toString(16).slice(2);
}

function esc(s = "") {
  return String(s)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;");
}

function choose(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function round(n, d = 2) {
  return Number.isFinite(n) ? Number(n.toFixed(d)) : null;
}

function rgbToHsl(r, g, b) {
  r /= 255;
  g /= 255;
  b /= 255;
  const max = Math.max(r, g, b);
  const min = Math.min(r, g, b);
  let h, s;
  const l = (max + min) / 2;

  if (max === min) {
    h = s = 0;
  } else {
    const d = max - min;
    s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
    switch (max) {
      case r:
        h = (g - b) / d + (g < b ? 6 : 0);
        break;
      case g:
        h = (b - r) / d + 2;
        break;
      default:
        h = (r - g) / d + 4;
    }
    h /= 6;
  }

  return { h: h * 360, s: s * 100, l: l * 100 };
}

function hueName(h) {
  if (h < 15 || h >= 345) return "red";
  if (h < 45) return "amber";
  if (h < 70) return "yellow";
  if (h < 160) return "green";
  if (h < 210) return "cyan";
  if (h < 260) return "blue";
  if (h < 300) return "violet";
  return "magenta";
}

function brightnessName(l) {
  if (l < 18) return "dark";
  if (l < 38) return "dim";
  if (l < 68) return "soft";
  return "bright";
}

function timeOfDay(date) {
  if (!date) return "unknown";
  const h = date.getHours();
  if (h >= 5 && h < 11) return "morning";
  if (h >= 11 && h < 16) return "afternoon";
  if (h >= 16 && h < 21) return "evening";
  return "night";
}

function formatDate(date) {
  try {
    return new Intl.DateTimeFormat("fi-FI", {
      dateStyle: "medium",
      timeStyle: "short"
    }).format(date);
  } catch {
    return "unknown time";
  }
}

async function analyzeImageColors(file) {
  const url = URL.createObjectURL(file);
  const img = new Image();
  img.src = url;

  await new Promise((resolve, reject) => {
    img.onload = resolve;
    img.onerror = reject;
  });

  const max = 180;
  const scale = Math.min(max / img.width, max / img.height, 1);
  const w = Math.max(1, Math.round(img.width * scale));
  const h = Math.max(1, Math.round(img.height * scale));

  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d", { willReadFrequently: true });
  canvas.width = w;
  canvas.height = h;
  ctx.drawImage(img, 0, 0, w, h);

  const data = ctx.getImageData(0, 0, w, h).data;
  let r = 0, g = 0, b = 0, p = 0;

  for (let i = 0; i < data.length; i += 4) {
    if (data[i + 3] < 20) continue;
    r += data[i];
    g += data[i + 1];
    b += data[i + 2];
    p++;
  }

  URL.revokeObjectURL(url);

  if (!p) {
    return {
      averageRgb: { r: 0, g: 0, b: 0 },
      hsl: { h: 0, s: 0, l: 0 },
      hueLabel: "unknown",
      brightnessLabel: "soft"
    };
  }

  const avg = {
    r: Math.round(r / p),
    g: Math.round(g / p),
    b: Math.round(b / p)
  };

  const hsl = rgbToHsl(avg.r, avg.g, avg.b);

  return {
    averageRgb: avg,
    hsl: {
      h: round(hsl.h, 1),
      s: round(hsl.s, 1),
      l: round(hsl.l, 1)
    },
    hueLabel: hueName(hsl.h),
    brightnessLabel: brightnessName(hsl.l)
  };
}

async function readExif(file) {
  try {
    const data = await exifr.parse(file, {
      gps: true,
      tiff: true,
      exif: true,
      xmp: false,
      icc: false,
      iptc: false
    });

    const date = data?.DateTimeOriginal || data?.CreateDate || new Date(file.lastModified);

    return {
      cameraMake: data?.Make || null,
      cameraModel: data?.Model || null,
      iso: data?.ISO || null,
      focalLength: data?.FocalLength || null,
      date: date instanceof Date ? date : new Date(file.lastModified),
      gps: typeof data?.latitude === "number" && typeof data?.longitude === "number"
        ? {
            latitude: round(data.latitude, 6),
            longitude: round(data.longitude, 6)
          }
        : null
    };
  } catch {
    return {
      cameraMake: null,
      cameraModel: null,
      iso: null,
      focalLength: null,
      date: new Date(file.lastModified),
      gps: null
    };
  }
}

function generateAforism({ exif, color }) {
  const tod = timeOfDay(exif?.date);
  const hue = color?.hueLabel || "unknown";
  const brightness = color?.brightnessLabel || "soft";

  const openers = {
    morning: [
      "The morning was already complete before the photograph.",
      "Morning offered form without asking for explanation.",
      "The day began by showing enough."
    ],
    afternoon: [
      "The visible world settled into itself.",
      "Afternoon held the ordinary with quiet precision.",
      "Attention arrived in the middle of the day."
    ],
    evening: [
      "Evening softened the edge between seeing and naming.",
      "The late light asked for less than interpretation.",
      "The day became simple at the moment of looking."
    ],
    night: [
      "Darkness did not hide the moment; it simplified it.",
      "Night reduced the world to what could be seen now.",
      "The image began where certainty became quieter."
    ],
    unknown: [
      "The moment arrived before language did.",
      "Seeing happened first.",
      "The world offered a small complete fragment."
    ]
  };

  const colorLines = {
    red: [
      "Color announced itself and nothing needed to be added.",
      "The warmth in the frame was already enough."
    ],
    amber: [
      "A warm edge carried the whole experience.",
      "Light touched the scene lightly, and that was enough."
    ],
    yellow: [
      "Brightness became the subject without becoming a concept.",
      "A clear tone held the frame together."
    ],
    green: [
      "The image rested in a simple field of attention.",
      "Green gathered the moment without effort."
    ],
    cyan: [
      "A cool openness gave the scene its breath.",
      "Space became visible through a quiet tone."
    ],
    blue: [
      "Blue asked only to be seen as blue.",
      "The scene opened through a calm visible note."
    ],
    violet: [
      "A slight strangeness made attention more honest.",
      "The frame carried wonder without insisting on meaning."
    ],
    magenta: [
      "The visible leaned gently toward the unexpected.",
      "The image held a small, vivid surprise."
    ],
    unknown: [
      "What appeared did not need a category.",
      "The frame stayed open to what it was."
    ]
  };

  const simpleLines = {
    dark: [
      "Less light, more clarity.",
      "What remained visible was sufficient."
    ],
    dim: [
      "The scene asked to be met, not solved.",
      "Low light simplified the act of seeing."
    ],
    soft: [
      "Nothing pressed for emphasis.",
      "Softness allowed attention to settle."
    ],
    bright: [
      "Brightness did not explain; it revealed.",
      "Strong light still left room for humility."
    ]
  };

  const endings = [
    "The photograph is only the trace of that meeting.",
    "A simple relationship was enough.",
    "Wonder arrived through attention, not effort.",
    "The frame records a moment of contact.",
    "Nothing was missing from the moment."
  ];

  return [
    choose(openers[tod] || openers.unknown),
    choose(colorLines[hue] || colorLines.unknown),
    choose(simpleLines[brightness] || simpleLines.soft),
    "",
    choose(endings)
  ].join("\\n");
}

function render() {
  const step = steps[state.step];
  const isCapture = state.step === 2;
  const canNext = state.step < 2;

  const phaseInfo = step.points.map(([title, body]) =>
    `<div class="point"><strong>${esc(title)}</strong><div class="notice">${esc(body)}</div></div>`
  ).join("");

  document.querySelector("#app").innerHTML = `
    <main class="shell">
      <section class="hero">
        <a href="index.html" class="back-link">Photodiarygame</a>
        <div class="eyebrow">Photodiarygame / Miksang</div>
        <h1>Nalanda Miksang<br/>practice flow</h1>
        <p class="lead">
          Kolmivaiheinen havaintoharjoitus. Pysähdy. Huomaa. Kuvaa yksi yksinkertainen kohtaaminen.
          Lopuksi kuva ja aforismi tallentuvat samaan Firebase-projektiin kuin photodiarygame.
        </p>
      </section>

      <section class="stack">
        <div class="stepper">
          ${steps.map((s, i) =>
            `<div class="step ${i === state.step ? "active" : ""}">
              <div class="label">${esc(s.label)}</div>
              <div class="title">${esc(s.title)}</div>
            </div>`
          ).join("")}
        </div>

        <div class="card stack">
          <div class="phase-title">${esc(step.title)}</div>
          <div class="notice thin">${esc(step.subtitle)}</div>
          <div class="phase-points">${phaseInfo}</div>

          ${isCapture ? `
            <div class="capture-wrap stack">
              <div class="small">Valitse tai ota yksi kuva vasta nyt.</div>
              <input id="fileInput" type="file" accept="image/*" capture="environment" />
              <div id="previewWrap" class="${state.previewUrl ? "" : "hidden"}">
                <div class="preview">
                  <img id="previewImage" src="${state.previewUrl ? esc(state.previewUrl) : ""}" alt="Preview" />
                </div>
              </div>
              <div class="actions">
                <button class="button primary" id="analyzeBtn" ${state.selectedFile ? "" : "disabled"}>Generate aforism</button>
                <button class="button soft" id="saveBtn" ${state.aforism ? "" : "disabled"}>Save to Firebase</button>
                <button class="button" id="resetCaptureBtn">Reset image</button>
              </div>
              <div id="captureStatus" class="status"></div>
            </div>
          ` : ""}

          <div class="actions">
            ${state.step > 0 ? `<button class="button" id="backBtn">Back</button>` : ""}
            ${canNext ? `<button class="button primary" id="nextBtn">Continue</button>` : ""}
          </div>
        </div>

        ${(state.aforism || state.savedDocId) ? `
          <div class="card stack">
            <div class="eyebrow">Result</div>
            ${state.previewUrl ? `
              <div class="result-image">
                <img src="${esc(state.previewUrl)}" alt="Captured image" />
              </div>
            ` : ""}
            ${state.aforism ? `<div class="aforism">${esc(state.aforism)}</div>` : ""}
            <div class="meta">
              ${state.color ? `
                <div class="tags">
                  <span class="tag">${esc(state.color.hueLabel)}</span>
                  <span class="tag">${esc(state.color.brightnessLabel)}</span>
                  ${state.exif?.cameraModel ? `<span class="tag">${esc(state.exif.cameraModel)}</span>` : ""}
                </div>
              ` : ""}
              ${state.exif?.date ? `<div>${esc(formatDate(state.exif.date))}</div>` : ""}
              ${state.savedDocId ? `<div class="status ok">Saved to Firebase. Document id: ${esc(state.savedDocId)}</div>` : ""}
            </div>
          </div>
        ` : ""}
      </section>

      <p class="footer-note">Miksang module v1 — same Firebase project, quieter flow.</p>
    </main>
  `;

  bind();
}

function bind() {
  const nextBtn = document.querySelector("#nextBtn");
  if (nextBtn) {
    nextBtn.addEventListener("click", () => {
      state.step = Math.min(2, state.step + 1);
      render();
    });
  }

  const backBtn = document.querySelector("#backBtn");
  if (backBtn) {
    backBtn.addEventListener("click", () => {
      state.step = Math.max(0, state.step - 1);
      render();
    });
  }

  const fileInput = document.querySelector("#fileInput");
  if (fileInput) {
    fileInput.addEventListener("change", (e) => {
      const file = e.target.files?.[0];
      if (!file) return;

      if (state.previewUrl) URL.revokeObjectURL(state.previewUrl);

      state.selectedFile = file;
      state.previewUrl = URL.createObjectURL(file);
      state.aforism = "";
      state.savedDocId = null;
      render();
    });
  }

  const analyzeBtn = document.querySelector("#analyzeBtn");
  if (analyzeBtn) {
    analyzeBtn.addEventListener("click", async () => {
      const status = document.querySelector("#captureStatus");
      if (!state.selectedFile) return;

      analyzeBtn.disabled = true;
      if (status) {
        status.textContent = "Reading image and generating aforism…";
        status.className = "status";
      }

      try {
        const [exif, color] = await Promise.all([
          readExif(state.selectedFile),
          analyzeImageColors(state.selectedFile)
        ]);

        state.exif = exif;
        state.color = color;
        state.aforism = generateAforism({ exif, color });
        render();

        const s = document.querySelector("#captureStatus");
        if (s) {
          s.textContent = "Aforism ready.";
          s.className = "status ok";
        }
      } catch (err) {
        console.error(err);
        if (status) {
          status.textContent = "Generation failed.";
          status.className = "status warn";
        }
        analyzeBtn.disabled = false;
      }
    });
  }

  const saveBtn = document.querySelector("#saveBtn");
  if (saveBtn) {
    saveBtn.addEventListener("click", async () => {
      const status = document.querySelector("#captureStatus");
      if (!state.selectedFile || !state.aforism) return;

      saveBtn.disabled = true;
      if (status) {
        status.textContent = "Uploading image and saving session…";
        status.className = "status";
      }

      try {
        const id = uid();
        const ext = state.selectedFile.name.includes(".")
          ? state.selectedFile.name.split(".").pop().toLowerCase()
          : "jpg";

        const path = `miksang/${id}/image.${ext && ext.length < 8 ? ext : "jpg"}`;
        const storageRef = ref(storage, path);

        await uploadBytes(storageRef, state.selectedFile, {
          contentType: state.selectedFile.type || "image/jpeg"
        });

        const imageUrl = await getDownloadURL(storageRef);

        const docRef = await addDoc(collection(db, "miksang_sessions"), {
          createdAt: serverTimestamp(),
          imageUrl,
          aforism: state.aforism,
          mode: "miksang",
          phaseData: {
            pauseSeen: true,
            noticeSeen: true,
            captureDone: true
          },
          exif: {
            dateISO: state.exif?.date ? state.exif.date.toISOString() : null,
            cameraMake: state.exif?.cameraMake || null,
            cameraModel: state.exif?.cameraModel || null,
            gps: state.exif?.gps || null,
            iso: state.exif?.iso || null,
            focalLength: state.exif?.focalLength || null
          },
          color: {
            averageRgb: state.color?.averageRgb || null,
            hsl: state.color?.hsl || null,
            hueLabel: state.color?.hueLabel || null,
            brightnessLabel: state.color?.brightnessLabel || null
          }
        });

        state.savedDocId = docRef.id;
        render();

        const s = document.querySelector("#captureStatus");
        if (s) {
          s.textContent = "Saved to Firebase.";
          s.className = "status ok";
        }
      } catch (err) {
        console.error(err);
        if (status) {
          status.textContent = "Saving failed. Check rules or connection.";
          status.className = "status warn";
        }
        saveBtn.disabled = false;
      }
    });
  }

  const resetCaptureBtn = document.querySelector("#resetCaptureBtn");
  if (resetCaptureBtn) {
    resetCaptureBtn.addEventListener("click", () => {
      if (state.previewUrl) URL.revokeObjectURL(state.previewUrl);
      state.selectedFile = null;
      state.previewUrl = null;
      state.exif = null;
      state.color = null;
      state.aforism = "";
      state.savedDocId = null;
      render();
    });
  }
}

render();
</script>
</body>
</html>
